name: Build VSIX

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and pack core c64jasm
        run: |
          npm ci
          npm run dist
          npm pack
          mkdir -p vscode/vendor
          mv c64jasm-*.tgz vscode/vendor/
          node -e "const fs=require('fs');const f='vscode/package-lock.json';const j=JSON.parse(fs.readFileSync(f,'utf8'));const p=j.packages&&j.packages['node_modules/c64jasm'];if(p){delete p.integrity;fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n');}"

      - name: Install dependencies
        working-directory: vscode
        run: npm install

      - name: Package VSIX
        working-directory: vscode
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: c64jasm-devtools-vsix
          path: vscode/build/*.vsix
          if-no-files-found: error
          retention-days: 30
