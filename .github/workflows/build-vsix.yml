name: Build VSIX

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Build and vendor core c64jasm
        # Builds the core and vendors it to vscode/vendor/c64jasm.tgz under a
        # distinct fork-local version (e.g. 0.9.2-lukka) so the embedded build
        # never collides with the public c64jasm@<same-version> on npm.
        run: |
          npm ci
          node scripts/vendor-core.js

      - name: Install dependencies
        working-directory: vscode
        run: npm install

      - name: Package VSIX
        working-directory: vscode
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: c64jasm-devtools-vsix
          path: vscode/build/*.vsix
          if-no-files-found: error
          retention-days: 30
