name: Release

on:
  release:
    types:
      - published

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Build and vendor core c64jasm
        # Builds the core and vendors it to vscode/vendor/c64jasm.tgz under a
        # distinct fork-local version (e.g. 0.9.2-lukka) so the embedded build
        # never collides with the public c64jasm@<same-version> on npm.
        run: |
          npm ci
          node scripts/vendor-core.js

      - name: Install dependencies
        working-directory: vscode
        run: npm install

      - name: Package VSIX
        working-directory: vscode
        run: npm run package

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vscode/build/*.vsix

      - name: Publish to VS Code Marketplace
        working-directory: vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --pat "$VSCE_PAT"
